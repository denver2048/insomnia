name: Insomnia image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (semver, e.g. 0.1.11 or v0.1.11)"
        required: true
        type: string
      push_latest:
        description: "Also tag and push as latest"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image tag
        id: norm
        run: |
          TAG="${{ inputs.tag }}"
          TAG="${TAG#v}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::tag must be semver (e.g. 0.1.11 or v0.1.11)"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Image name (GHCR must be lowercase)
        id: image
        run: echo "name=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}

      - name: Set up QEMU (cross-arch for arm64 builds on amd64 runners)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ steps.norm.outputs.tag }}
            type=raw,value=latest,enable=${{ inputs.push_latest == true }}

      # Do not use GHA cache (type=gha) for multi-platform pushes: it can produce a manifest
      # with only one arch, causing "no match for platform" on arm64 Kind nodes.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          # Kind on Apple Silicon / arm64 nodes need linux/arm64; clusters often amd64.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false

      - name: Verify multi-arch manifest
        run: docker buildx imagetools inspect "${{ steps.image.outputs.name }}:${{ steps.norm.outputs.tag }}"
