name: Insomnia image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - "api/**"
      - "agent/**"
      - "config/**"
      - "eventhub/**"
      - "investigators/**"
      - "tools/**"
      - "charts/insomnia/Chart.yaml"
      - ".github/workflows/insomnia-image.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - "api/**"
      - "agent/**"
      - "config/**"
      - "eventhub/**"
      - "investigators/**"
      - "tools/**"
      - "charts/insomnia/Chart.yaml"
      - ".github/workflows/insomnia-image.yml"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Helm chart version
        id: chart
        run: |
          VERSION=$(grep -E '^version:' charts/insomnia/Chart.yaml | head -1 | awk '{print $2}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Image name (GHCR must be lowercase)
        id: image
        run: echo "name=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.chart.outputs.version }},enable=${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
            type=raw,value=${{ steps.chart.outputs.version }}-pr.${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
