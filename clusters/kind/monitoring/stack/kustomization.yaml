apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: flux-system
configMapGenerator:
  - name: kube-prometheus-stack-values
    files:
      - values.yaml=kube-prometheus-stack-values.yaml
generatorOptions:
  disableNameSuffixHash: true
resources:
  - helmrepository.yaml
  - helmrelease.yaml
