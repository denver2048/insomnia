apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: insomnia-imagepull-alert
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: insomnia.rules
    rules:
    - alert: KubernetesImagePullBackOff
      expr: kube_pod_container_status_waiting_reason{reason=~"ImagePullBackOff|ErrImagePull"} == 1
      for: 10s
      labels:
        severity: warning
        insomnia: "true"
      annotations:
        summary: "Pod {{$labels.pod}} cannot pull image"
        description: "Container {{$labels.container}} in {{$labels.namespace}}/{{$labels.pod}} is in ImagePullBackOff"
    - alert: PodPending
      expr: |
        kube_pod_status_phase{phase="Pending"} == 1
        unless on(pod,namespace)
        kube_pod_owner{owner_kind="Job"}
      for: 10s
      labels:
        severity: warning
        insomnia: "true"
      annotations:
        summary: "Pod stuck in Pending"
        description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been Pending for more than 10 seconds."
    - alert: PodOOMKilled
      expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
      for: 10s
      labels:
        severity: warning
        insomnia: "true"
      annotations:
        summary: "Container OOMKilled"
        description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} was killed due to out-of-memory."
