# Registers the Insomnia SRE agent in Kagent (same namespace as the insomnia Deployment and kagent).
# Uses the ai-system chart ModelConfig gateway-llm (AgentGateway → OpenAI-compatible backend).
# apiVersion must match served CRDs from kagent-crds (v1alpha1 is the stable choice for chart 0.8.x).
# Invoke via kagent CLI / dashboard; Alertmanager still targets Service insomnia in this namespace.
apiVersion: kagent.dev/v1alpha1
kind: Agent
metadata:
  name: insomnia
  namespace: insomnia
spec:
  description: Insomnia — Kubernetes incident analysis (registered in Kagent; webhook workload is Deployment insomnia).
  type: Declarative
  declarative:
    runtime: python
    modelConfig: gateway-llm
    systemMessage: |
      You are the Insomnia SRE agent. You analyze Kubernetes incidents using cluster context.
      When invoked through Kagent, give concise, actionable answers aligned with on-call workflows.
    stream: false
