---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway-crds
  namespace: flux-system
spec:
  interval: 24h
  releaseName: agentgateway-crds
  targetNamespace: agentgateway-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chartRef:
    kind: OCIRepository
    name: agentgateway-crds
    namespace: flux-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway
  namespace: flux-system
spec:
  interval: 24h
  releaseName: agentgateway
  targetNamespace: agentgateway-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: agentgateway-crds
      namespace: flux-system
  chartRef:
    kind: OCIRepository
    name: agentgateway-chart
    namespace: flux-system
  values:
    controller:
      image:
        pullPolicy: Always
      logLevel: debug
      extraEnv:
        KGW_ENABLE_GATEWAY_API_EXPERIMENTAL_FEATURES: "true"
