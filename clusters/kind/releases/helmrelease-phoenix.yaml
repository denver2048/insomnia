---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: phoenix
  namespace: flux-system
spec:
  interval: 24h
  timeout: 15m
  releaseName: phoenix
  targetNamespace: monitoring
  dependsOn:
    - name: kube-prometheus-stack
      namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chartRef:
    kind: OCIRepository
    name: phoenix-helm
    namespace: flux-system
  values:
    # When true, OTLP ingestion requires a system API key (or bearer) until one is created in UI.
    # false allows traces without PHOENIX_API_KEY (typical for Kind / internal clusters).
    auth:
      enableAuth: false
    ingress:
      enabled: false
    postgresql:
      storage:
        requestedSize: 5Gi
