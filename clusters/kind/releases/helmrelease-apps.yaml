---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ai-system
  namespace: flux-system
spec:
  interval: 10m
  releaseName: ai-system
  targetNamespace: insomnia
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: agentgateway
      namespace: flux-system
    - name: kagent-crds
      namespace: flux-system
  chart:
    spec:
      chart: charts/ai-system
      sourceRef:
        kind: GitRepository
        name: insomnia
        namespace: flux-system
  values:
    namespace: insomnia
    gatewayApi:
      installCrds: false
      installExperimental: false
    kagent:
      namespace: insomnia
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: insomnia
  namespace: flux-system
spec:
  interval: 10m
  timeout: 20m
  releaseName: insomnia
  targetNamespace: insomnia
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: agentgateway
      namespace: flux-system
    - name: kagent
      namespace: flux-system
    - name: phoenix
      namespace: flux-system
  chart:
    spec:
      chart: charts/insomnia
      sourceRef:
        kind: GitRepository
        name: insomnia
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/denver2048/insomnia
      tag: latest
      pullPolicy: Always
    imagePullSecrets:
      - name: ghcr-credentials
    openai:
      baseUrl: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/v1
    phoenix:
      # Host used to derive OTLP gRPC :4317 (default) or HTTP :6006/v1/traces if otlpProtocol=http/protobuf
      collectorEndpoint: http://phoenix-svc.monitoring.svc.cluster.local:6006
      projectName: insomnia
      # Omit PHOENIX_API_KEY while Phoenix helm has auth.enableAuth: false — a bad key can reject OTLP.
      # When you enable Phoenix auth, set apiKeyExistingSecret: insomnia-phoenix and sync the key.
      otelServiceName: insomnia
      otlpProtocol: grpc
