---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ai-system
  namespace: flux-system
spec:
  interval: 10m
  releaseName: ai-system
  targetNamespace: insomnia
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: agentgateway
      namespace: flux-system
    - name: kagent-crds
      namespace: flux-system
  chart:
    spec:
      chart: charts/ai-system
      sourceRef:
        kind: GitRepository
        name: insomnia
        namespace: flux-system
  values:
    namespace: insomnia
    gatewayApi:
      installCrds: false
      installExperimental: false
    kagent:
      namespace: insomnia
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: insomnia
  namespace: flux-system
spec:
  interval: 10m
  # Helm default wait is 5m; GHCR pulls (incl. multi-arch) + rollout often need longer on Kind.
  timeout: 20m
  releaseName: insomnia
  targetNamespace: insomnia
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: agentgateway
      namespace: flux-system
    - name: kagent
      namespace: flux-system
  chart:
    spec:
      chart: charts/insomnia
      sourceRef:
        kind: GitRepository
        name: insomnia
        namespace: flux-system
  values:
    # Set here so Flux always applies GHCR (chart defaults alone can stay stale if merge/revision is old).
    image:
      repository: ghcr.io/denver2048/insomnia
      tag: latest
      pullPolicy: Always
    imagePullSecrets:
      - name: ghcr-credentials
    openai:
      baseUrl: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/v1
