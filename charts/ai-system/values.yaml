# ai-system: AgentGateway + Kagent + Gateway API + OpenAI backend
# Default namespace matches Insomnia + kagent (Flux clusters/kind).

namespace: insomnia

# --- Gateway API (required for AgentGateway) ---
gatewayApi:
  # Install standard CRDs (v1.5.0); false when Gateway API is installed by Flux (clusters/kind/infrastructure)
  installCrds: false
  # Experimental CRDs (optional, for advanced features)
  installExperimental: false

# --- AgentGateway (kgateway) ---
agentgateway:
  enabled: true
  crdsVersion: v1.0.0-rc.1
  chartVersion: v1.0.0-rc.1
  # Control plane + proxy live in agentgateway-system by default; we create Gateway in ai-system
  systemNamespace: agentgateway-system
  # Enable experimental Gateway API features if needed
  experimentalFeatures: true
  # Proxy logging: so kgateway/agentgateway proxy logs are visible and useful
  logging:
    level: debug   # debug | info | warn | error
    format: json  # json | text

# --- LLM Backend (OpenAI) ---
llm:
  provider: openai
  # Model name (e.g. gpt-4o, gpt-4o-mini)
  model: gpt-5.2
  # Secret name for API key (create separately; key in secret: Authorization)
  secretName: openai-secret
  # Optional: custom path for HTTPRoute (e.g. /v1/chat/completions)
  routePath: ""  # default: route all to backend

# --- Kagent (built-in agents disabled; Insomnia is the agent using the gateway) ---
kagent:
  enabled: true
  # Provision script installs Kagent with all built-in agents disabled (agents.*.enabled=false)
  builtInAgentsDisabled: true
  # Namespace for Kagent (same as release namespace by default)
  namespace: ""  # defaults to .Release.Namespace
  # Gateway used by Insomnia (OPENAI_BASE_URL), not by Kagent built-in agents
  useGateway: true
  # Gateway service (in same cluster) for agents to call
  gatewayService: agentgateway-proxy.agentgateway-system.svc.cluster.local
  gatewayPort: 80
  # Base URL for OpenAI-compatible API (agents will use this)
  gatewayBaseUrl: "http://agentgateway-proxy.agentgateway-system.svc.cluster.local/v1"
  # Install profile: demo (with built-in agents) or minimal
  profile: demo
  # Kagent Helm chart version (optional override)
  chartVersion: ""

# --- Secrets: do not store real keys in values; use existingSecret or create manually ---
secrets:
  # Create a placeholder secret; user must replace with real key via kubectl or CI
  createOpenAISecret: false
  # Name of existing secret for OpenAI API key (key: Authorization)
  openaiSecretName: openai-secret

# --- ConfigMaps (gateway/backend/routing config) ---
configMaps:
  gateway: {}
  backend: {}
  modelRouting: {}

# --- Jira MCP for kagent (RemoteMCPServer) ---
# Deploys guang1/jira-mcp (Streamable HTTP on /mcp) and registers kagent.dev/v1alpha2 RemoteMCPServer "jira-mcp".
# Create the secret first: scripts/create-jira-secret.sh (insomnia-jira: JIRA_BASE_URL, JIRA_USERNAME, JIRA_API_TOKEN).
jiraMcp:
  enabled: false
  secretName: insomnia-jira
  image:
    repository: guang1/jira-mcp
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  remote:
    timeout: 60s
    sseReadTimeout: 5m0s
