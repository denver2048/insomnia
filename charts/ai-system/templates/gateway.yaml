{{- if .Values.agentgateway.enabled }}
# Gateway: exposes AgentGateway proxy (agentgateway-system). parametersRef → AgentgatewayParameters (same namespace; v1 Gateway allows only group/kind/name, not namespace).
# If upgrade fails with parametersRef.namespace, delete the existing Gateway once: kubectl delete gateway agentgateway-proxy -n agentgateway-system
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentgateway-proxy
  namespace: {{ .Values.agentgateway.systemNamespace }}
  labels:
    app.kubernetes.io/name: ai-system
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  gatewayClassName: agentgateway
  infrastructure:
    parametersRef:
      group: agentgateway.dev
      kind: AgentgatewayParameters
      name: agentgateway-proxy-params
  listeners:
  - protocol: HTTP
    port: 80
    name: http
    allowedRoutes:
      namespaces:
        from: All
{{- end }}
