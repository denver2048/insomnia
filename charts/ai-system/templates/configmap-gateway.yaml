{{- if .Values.agentgateway.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: {{ .Values.agentgateway.systemNamespace }}
  labels:
    app.kubernetes.io/name: ai-system
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  # Gateway configuration reference (AgentGateway uses Gateway API + AgentgatewayBackend; this documents the setup)
  gateway-class: agentgateway
  listener-http-port: "80"
  listener-name: http
  allowed-routes-namespaces: "All"
{{- end }}
