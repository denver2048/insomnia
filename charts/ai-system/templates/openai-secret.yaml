{{- if .Values.secrets.createOpenAISecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.openaiSecretName }}
  namespace: {{ .Values.agentgateway.systemNamespace }}
  labels:
    app.kubernetes.io/name: ai-system
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  # User must replace with real key: kubectl patch secret openai-secret -n agentgateway-system --type merge -p '{"stringData":{"Authorization":"YOUR_OPENAI_API_KEY"}}'
  Authorization: "REPLACE_WITH_OPENAI_API_KEY"
{{- end }}
