replicaCount: 1

image:
  repository: insomnia
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8000

logProvider: kubernetes

loki:
  url: http://loki.monitoring.svc:3100

prometheus:
  url: http://kube-prometheus-stack-prometheus.monitoring.svc:9090

# OpenAI: inject OPENAI_API_KEY (and optional OPENAI_MODEL) from a Secret
openai:
  # Name of existing secret with key OPENAI_API_KEY (optional key OPENAI_MODEL)
  existingSecret: insomnia-openai
  # Optional: create secret from values (avoid in prod; use existingSecret instead)
  createSecret: false
  apiKey: ""
  model: "gpt-4o-mini"
  # When set (e.g. to AgentGateway), Insomnia uses this as the LLM endpoint (OpenAI-compatible). Example: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/v1
  baseUrl: ""