replicaCount: 1

# Optional: override Chart.name for labels (leave empty for default).
nameOverride: ""

# CI pushes to ghcr.io/<github-owner>/<repo> (see .github/workflows/insomnia-image.yml).
image:
  repository: ghcr.io/denver2048/insomnia
  tag: latest
  # With tag "latest", Always avoids a stale node cache; pin a semver tag if you prefer IfNotPresent.
  pullPolicy: Always

# For private GHCR packages: create docker-registry secret ghcr-credentials (see repo provision.sh).
# Set to [] if the package is public and you do not use a pull secret.
imagePullSecrets: []

service:
  port: 8000

# Triage (INSOMNIA_USE_TRIAGE): when true, OpenAI may set should_investigate=false — no investigation and no Jira ITSM.
# Set false to run full investigation (and ITSM when Jira is enabled) for every alert that passes guardrails.
triageEnabled: true

logProvider: kubernetes

loki:
  url: http://loki.monitoring.svc:3100

prometheus:
  url: http://kube-prometheus-stack-prometheus.monitoring.svc:9090

# OpenAI: inject OPENAI_API_KEY (and optional OPENAI_MODEL) from a Secret
openai:
  # Name of existing secret with key OPENAI_API_KEY (optional key OPENAI_MODEL)
  existingSecret: insomnia-openai
  # Optional: create secret from values (avoid in prod; use existingSecret instead)
  createSecret: false
  apiKey: ""
  model: "gpt-4o-mini"
  # When set (e.g. to AgentGateway), Insomnia uses this as the LLM endpoint (OpenAI-compatible). Example: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/v1
  baseUrl: ""

# Arize Phoenix (LLM traces). Set collectorEndpoint to enable; see https://docs.arize.com/phoenix/tracing/how-to-tracing/setup-tracing/setup-using-phoenix-otel
phoenix:
  collectorEndpoint: "http://localhost:6006"
  projectName: default
  # Optional: Secret in this namespace with key PHOENIX_API_KEY (or apiKeySecretKey). Required if Phoenix has auth.enableAuth=true.
  # ./provision.sh creates insomnia-phoenix from phoenix-secret when possible.
  apiKeyExistingSecret: ""
  apiKeySecretKey: PHOENIX_API_KEY
  # OpenTelemetry resource (shown in Phoenix UI)
  otelServiceName: insomnia
  # Set true to skip the startup bootstrap span (project still appears on first real trace)
  skipBootstrapTrace: false
  # Set true to expose GET /debug/phoenix-trace (emit another test span)
  debugHttpEndpoint: false
  # OTLP transport: grpc (default, uses host from collectorEndpoint + port 4317) or http/protobuf (6006/v1/traces)
  otlpProtocol: grpc

# Optional: Jira MCP (stdio via npx) + REST ITSM notifications. Secret: JIRA_BASE_URL, JIRA_USERNAME, JIRA_API_TOKEN.
# Mount Jira env when jira.enabled OR jira.itsmNotify (ITSM-only without MCP: enabled=false, itsmNotify=true).
jira:
  enabled: false
  existingSecret: insomnia-jira
  # When false, MCP fetch step is skipped; REST ITSM still runs if itsmNotify is true (requires secret + env block).
  mcpEnabled: true
  # Post investigation report to Jira (comment on linked issue, or new issue in itsmProjectKey).
  itsmNotify: false
  # Jira project key for new issues when the alert has no jira_issue / jira_key / issue_key label or annotation.
  # If empty, ITSM only comments on alerts that reference an existing issue. Override: helm --set jira.itsmProjectKey=OTHER
  itsmProjectKey: "KAN"
  itsmIssueType: Task