{{- if .Values.openai.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.openai.existingSecret }}
  labels:
    app.kubernetes.io/name: insomnia
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.openai.apiKey | quote }}
  {{- if .Values.openai.model }}
  OPENAI_MODEL: {{ .Values.openai.model | quote }}
  {{- end }}
{{- end }}
