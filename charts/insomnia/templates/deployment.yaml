apiVersion: apps/v1
kind: Deployment
metadata:
  name: insomnia
  labels:
    app.kubernetes.io/name: insomnia
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "insomnia.matchLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "insomnia.podLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: insomnia
      containers:
      - name: insomnia
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}

        ports:
        - containerPort: 8000

        env:
        - name: LOG_PROVIDER
          value: {{ .Values.logProvider }}

        - name: LOKI_URL
          value: {{ .Values.loki.url }}

        - name: PROMETHEUS_URL
          value: {{ .Values.prometheus.url }}

        {{- if .Values.openai.baseUrl }}
        - name: OPENAI_BASE_URL
          value: {{ .Values.openai.baseUrl | quote }}
        {{- end }}

        {{- if .Values.phoenix.collectorEndpoint }}
        - name: PHOENIX_COLLECTOR_ENDPOINT
          value: {{ .Values.phoenix.collectorEndpoint | quote }}
        - name: PHOENIX_PROJECT_NAME
          value: {{ .Values.phoenix.projectName | quote }}
        - name: OTEL_SERVICE_NAME
          value: {{ .Values.phoenix.otelServiceName | default "insomnia" | quote }}
        {{- if .Values.phoenix.skipBootstrapTrace }}
        - name: PHOENIX_SKIP_BOOTSTRAP_TRACE
          value: "true"
        {{- end }}
        {{- if .Values.phoenix.debugHttpEndpoint }}
        - name: INSOMNIA_PHOENIX_DEBUG_ENDPOINT
          value: "true"
        {{- end }}
        - name: PHOENIX_OTLP_PROTOCOL
          value: {{ .Values.phoenix.otlpProtocol | default "grpc" | quote }}
        - name: OTEL_EXPORTER_OTLP_INSECURE
          value: "true"
        {{- end }}
        {{- if .Values.phoenix.apiKeyExistingSecret }}
        - name: PHOENIX_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.phoenix.apiKeyExistingSecret | quote }}
              key: {{ .Values.phoenix.apiKeySecretKey | default "PHOENIX_API_KEY" | quote }}
              optional: true
        {{- end }}

        envFrom:
        - secretRef:
            name: {{ .Values.openai.existingSecret }}
            optional: true

        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5