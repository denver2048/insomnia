apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: insomnia-readonly
rules:
- apiGroups: [""]
  resources:
  - pods
  - pods/log
  - events
  - nodes
  - namespaces
  verbs:
  - get
  - list
  - watch

- apiGroups: ["apps"]
  resources:
  - deployments
  - replicasets
  - statefulsets
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: insomnia-readonly
subjects:
- kind: ServiceAccount
  name: insomnia
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: insomnia-readonly
  apiGroup: rbac.authorization.k8s.io