apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-readonly
rules:
  # Core resources
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - events
      - namespaces
      - nodes
      - services
    verbs:
      - get
      - list
      - watch

  # Workloads
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - daemonsets
      - statefulsets
    verbs:
      - get
      - list
      - watch

  # Metrics
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs:
      - get
      - list

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-readonly-binding
subjects:
  - kind: ServiceAccount
    name: kubernetes-mcp-server
    namespace: kubernetes-mcp-server
roleRef:
  kind: ClusterRole
  name: mcp-readonly
  apiGroup: rbac.authorization.k8s.io